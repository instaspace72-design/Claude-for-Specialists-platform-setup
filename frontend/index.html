<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600;1,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --aubergine:#2A1240;
  --orange:#F2622E;
  --crimson:#D11E4C;
  --cream:#F5EFE8;
  --ground:#120822;
  --aubergine-deep:#1E0C30;
  --aubergine-lift:#341A4E;
  --grad:linear-gradient(135deg,#F2622E,#D11E4C);
  --sans:'Urbanist', system-ui, sans-serif;
  --mono:'Space Mono', ui-monospace, monospace;
  --r-sm:7px; --r-md:11px; --r-lg:18px; --r-pill:999px;
  --ease:cubic-bezier(.22,.61,.36,1);
  /* accent is overridable by Tweaks */
  --accent:#F2622E;
  --accent-2:#D11E4C;
  --accent-grad:linear-gradient(135deg,#F2622E,#D11E4C);
  /* motion scale set by Tweaks (0 = off, 1 = normal, 1.5 = lively) */
  --mo:1;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--sans);
  background:var(--ground);
  color:var(--cream);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
#root{height:100vh;width:100vw;}

/* cream text opacity steps */
.c94{color:rgba(245,239,232,.94);}
.c82{color:rgba(245,239,232,.82);}
.c70{color:rgba(245,239,232,.70);}
.c50{color:rgba(245,239,232,.50);}
.c35{color:rgba(245,239,232,.35);}

.eyebrow{
  font-family:var(--mono);
  text-transform:uppercase;
  letter-spacing:.18em;
  font-size:11px;
  color:rgba(245,239,232,.5);
}
.mono{font-family:var(--mono);}

/* signature surface: 64px cream grid masked toward a corner */
.grid-surface{
  background-image:
    linear-gradient(rgba(245,239,232,.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,239,232,.055) 1px, transparent 1px);
  background-size:64px 64px;
  -webkit-mask-image:radial-gradient(120% 120% at 100% 0%, #000 0%, transparent 70%);
  mask-image:radial-gradient(120% 120% at 100% 0%, #000 0%, transparent 70%);
}

/* buttons */
.btn{
  font-family:var(--sans); font-weight:700; font-size:15px;
  border:none; cursor:pointer; border-radius:var(--r-pill);
  padding:13px 24px; display:inline-flex; align-items:center; gap:10px;
  transition:transform .18s var(--ease), box-shadow .18s var(--ease), background .2s var(--ease);
}
.btn-primary{ background:var(--accent); color:var(--aubergine); }
.btn-primary:hover{ transform:translateY(calc(-2px * var(--mo))); box-shadow:0 10px 30px -8px var(--accent); }
.btn-primary:active{ transform:translateY(0); }
.btn-ghost{ background:transparent; color:var(--cream); border:1px solid rgba(245,239,232,.18); }
.btn-ghost:hover{ background:rgba(245,239,232,.06); border-color:rgba(245,239,232,.35); }

/* surfaces */
.surface{ background:var(--aubergine-lift); border:1px solid rgba(245,239,232,.08); border-radius:var(--r-lg); }
.pill{ display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:var(--r-pill); font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; }

/* scrollbars */
.scroll{ overflow-y:auto; scrollbar-width:thin; scrollbar-color:rgba(245,239,232,.2) transparent; }
.scroll::-webkit-scrollbar{ width:9px; }
.scroll::-webkit-scrollbar-thumb{ background:rgba(245,239,232,.16); border-radius:99px; border:2px solid transparent; background-clip:padding-box; }
.scroll::-webkit-scrollbar-thumb:hover{ background:rgba(245,239,232,.28); background-clip:padding-box; }

/* ===== motion ===== */
@keyframes rise{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:none;} }
@keyframes fadein{ from{opacity:0;} to{opacity:1;} }
@keyframes pop{ 0%{transform:scale(.6); opacity:0;} 60%{transform:scale(1.08);} 100%{transform:scale(1); opacity:1;} }
@keyframes shimmer{ 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
@keyframes blink{ 0%,80%,100%{opacity:.25; transform:translateY(0);} 40%{opacity:1; transform:translateY(-3px);} }
@keyframes spinIn{ from{opacity:0; transform:rotate(-8deg) scale(.9);} to{opacity:1; transform:none;} }
@keyframes floatUp{ from{transform:translateY(0); opacity:1;} to{transform:translateY(-46px); opacity:0;} }
@keyframes confettiFall{ 0%{transform:translateY(-10px) rotate(0); opacity:1;} 100%{transform:translateY(120px) rotate(320deg); opacity:0;} }
@keyframes ringDash{ from{stroke-dashoffset:var(--from);} to{stroke-dashoffset:var(--to);} }
@keyframes glowPulse{ 0%,100%{box-shadow:0 0 0 0 rgba(242,98,46,.0);} 50%{box-shadow:0 0 26px -4px var(--accent);} }
@keyframes slideInR{ from{opacity:0; transform:translateX(40px);} to{opacity:1; transform:none;} }
@keyframes barGrow{ from{transform:scaleX(0);} to{transform:scaleX(1);} }

.reveal{ animation:rise calc(.5s * var(--mo, 1)) var(--ease) both; }
.reveal[style]{}
[data-mo="0"] .reveal, [data-mo="0"] .stagger>*{ animation:none !important; opacity:1 !important; transform:none !important; }
.stagger>*{ animation:rise calc(.55s * var(--mo,1)) var(--ease) both; }

@media (prefers-reduced-motion: reduce){
  .reveal, .stagger>*{ animation:none !important; opacity:1 !important; transform:none !important; }
}

/* screen transition wrapper */
.screen{ animation:rise calc(.42s * var(--mo,1)) var(--ease) both; height:100%; }

a{ color:var(--accent); }
a:hover{ color:var(--accent-2); }

/* range/input reset for chat */
textarea, input{ font-family:var(--sans); }
</style>
</head>
